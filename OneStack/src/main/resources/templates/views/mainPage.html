<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/main_layout}">
<th:block layout:fragment="content">
	<!-- Hero Section -->
	    <header class="hero">
	        <div class="container">
	            <h1 class="display-4">Find Your Service</h1>
	            <p class="lead">Connecting you with the best local professionals.</p>
	            <a href="#services" class="btn btn-light btn-lg">Get Started</a>
	        </div>
	    </header>

	    <!-- Services Section -->
	    <section id="services" class="container my-5">
	        <h2 class="text-center mb-4">Popular Services</h2>
	        <div class="row">
	            <!-- Service Card 1 -->
	            <div class="col-md-4 service-card">
	                <div class="card">
	                    <img src="https://via.placeholder.com/300" class="card-img-top" alt="Service 1">
	                    <div class="card-body">
	                        <h5 class="card-title">Service 1</h5>
	                        <p class="card-text">Description of Service 1.</p>
	                        <a href="#" class="btn btn-primary">Learn More</a>
	                    </div>
	                </div>
	            </div>
	            <!-- Service Card 2 -->
	            <div class="col-md-4 service-card">
	                <div class="card">
	                    <img src="https://via.placeholder.com/300" class="card-img-top" alt="Service 2">
	                    <div class="card-body">
	                        <h5 class="card-title">Service 2</h5>
	                        <p class="card-text">Description of Service 2.</p>
	                        <a href="#" class="btn btn-primary">Learn More</a>
	                    </div>
	                </div>
	            </div>
	            <!-- Service Card 3 -->
	            <div class="col-md-4 service-card">
	                <div class="card">
	                    <img src="https://via.placeholder.com/300" class="card-img-top" alt="Service 3">
	                    <div class="card-body">
	                        <h5 class="card-title">Service 3</h5>
	                        <p class="card-text">Description of Service 3.</p>
	                        <a href="#" class="btn btn-primary">Learn More</a>
	                    </div>
	                </div>
	            </div>
	        </div>
	    </section>
</th:block>
</html>
